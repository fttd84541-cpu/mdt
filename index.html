<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LSPD MDT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#111827;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:260px;
background:#0f172a;
padding:25px;
border-right:1px solid #202b44;
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:40px;
}

.menu button{
width:100%;
margin-bottom:10px;
padding:14px;
background:#182339;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.menu button:hover{
background:#2563eb;
}

.main{
flex:1;
padding:35px;
overflow:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid #334155;
}

input,select{
width:100%;
padding:12px;
background:#0f172a;
color:white;
border:1px solid #334155;
border-radius:8px;
}

.blue{
background:#2563eb;
}

.green{
background:#10b981;
}

.red{
background:#ef4444;
}

button.action{
padding:10px 18px;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-right:5px;
}

.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
width:420px;
background:#1e293b;
padding:35px;
border-radius:15px;
}

.loginBox h1{
margin-bottom:20px;
}

.loginBox input{
margin-bottom:15px;
}

.loginBox button{
width:100%;
padding:14px;
background:#2563eb;
border:none;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="login" id="login">

<div class="loginBox">

<h1>Police MDT</h1>

<input id="user" placeholder="Uživatel">

<input id="pass" type="password" placeholder="Heslo">

<button onclick="login()">Přihlásit</button>

<p id="err" style="margin-top:15px;color:red;"></p>

</div>

</div>

<div class="sidebar">

<div class="logo">
LSPD MDT
</div>

<div class="menu">

<button>Dashboard</button>
<button>BOLO</button>
<button>Hledané osoby</button>
<button>Občané</button>
<button>Vozidla</button>
<button>Zákoník</button>
<button>Řidičáky</button>
<button>Zbrojní průkazy</button>
<button>Vysílačka</button>
<button>Učební materiály</button>
<button id="adminBtn" class="hidden">AT Panel</button>

</div>

</div>

<div class="main">

<div class="card">

<h2>Dashboard</h2>

<br>

<table>

<tr>

<th>Jednotka</th>
<th>Role</th>
<th>Status</th>

</tr>

<tr>

<td>Adam-12</td>
<td>LAPD</td>
<td>Online</td>

</tr>

<tr>

<td>Lincoln-21</td>
<td>LASD</td>
<td>Online</td>

</tr>

<tr>

<td>Highway-7</td>
<td>SAHP</td>
<td>Offline</td>

</tr>

</table>

</div>

<div class="card">

<h2>Aktivní BOLO</h2>

<br>

<table>

<tr>

<th>Osoba</th>
<th>Důvod</th>
<th>Priorita</th>

</tr>

<tr>

<td>John Smith</td>
<td>Ozbrojené přepadení</td>
<td>Vysoká</td>

</tr>

</table>

</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="admin"&&p=="ponožka1"){

document.getElementById("login").style.display="none";
document.getElementById("adminBtn").classList.remove("hidden");

}

else if(u=="officer"&&p=="rescue12"){

document.getElementById("login").style.display="none";

}

else{

document.getElementById("err").innerHTML="Špatné přihlašovací údaje.";

}

}

</script>

</body>
</html>
<script>

/* =========================
   LOGIN STATE
========================= */
let role = "";
let citizens = JSON.parse(localStorage.getItem("citizens") || "[]");
let bolo = JSON.parse(localStorage.getItem("bolo") || "[]");

/* =========================
   LOGIN
========================= */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="admin" && p=="ponožka1"){
role="AT";
startApp(true);
}
else if(u=="officer" && p=="rescue12"){
role="PD";
startApp(false);
}
else{
document.getElementById("err").innerText="Špatné přihlašovací údaje";
}
}

function startApp(isAT){
document.getElementById("login").style.display="none";
document.getElementById("sidebar").classList.remove("hidden");
document.getElementById("main").classList.remove("hidden");

if(isAT){
document.getElementById("atBtn").classList.remove("hidden");
}

renderCitizens();
renderBOLO();
}

/* =========================
   NAVIGACE
========================= */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
document.getElementById(page).classList.remove("hidden");
}

/* =========================
   BOLO SYSTEM
========================= */
function addBOLO(name, reason, priority){
bolo.push({name, reason, priority});
localStorage.setItem("bolo", JSON.stringify(bolo));
renderBOLO();
}

function deleteBOLO(index){
bolo.splice(index,1);
localStorage.setItem("bolo", JSON.stringify(bolo));
renderBOLO();
}

function renderBOLO(){
let container=document.getElementById("bolo");

container.innerHTML=`
<div class="card">
<h3>BOLO systém</h3>

<input id="boloName" placeholder="Osoba">
<input id="boloReason" placeholder="Důvod">

<select id="boloPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button class="primary" onclick="createBOLO()">Přidat BOLO</button>
</div>

<div class="card">
<table>
<tr><th>Jméno</th><th>Důvod</th><th>Priorita</th><th></th></tr>

${bolo.map((b,i)=>`
<tr>
<td>${b.name}</td>
<td>${b.reason}</td>
<td>${b.priority}</td>
<td><button onclick="deleteBOLO(${i})">X</button></td>
</tr>
`).join("")}

</table>
</div>
`;
}

function createBOLO(){
let n=document.getElementById("boloName").value;
let r=document.getElementById("boloReason").value;
let p=document.getElementById("boloPriority").value;

if(!n || !r) return;

addBOLO(n,r,p);
}

/* =========================
   OBČANÉ SYSTEM
========================= */
function addCitizen(name, dob){
citizens.push({name,dob});
localStorage.setItem("citizens", JSON.stringify(citizens));
renderCitizens();
}

function renderCitizens(){
let container=document.getElementById("citizens");

container.innerHTML=`
<div class="card">
<h3>Občané</h3>

<input id="citName" placeholder="Jméno">
<input id="citDob" placeholder="Datum narození">

<button class="primary" onclick="createCitizen()">Přidat občana</button>
</div>

<div class="card">
<table>
<tr><th>Jméno</th><th>Datum narození</th></tr>

${citizens.map((c,i)=>`
<tr>
<td>${c.name}</td>
<td>${c.dob}</td>
</tr>
`).join("")}

</table>
</div>
`;
}

function createCitizen(){
let n=document.getElementById("citName").value;
let d=document.getElementById("citDob").value;

if(!n || !d) return;

addCitizen(n,d);
}

</script>
